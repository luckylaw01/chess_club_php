<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Academy | Black Knights Chess Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#050505',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-500 font-sans">

    <!-- Navigation -->
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3 group">
                <div
                    class="bg-blue-600 p-2.5 rounded-2xl shadow-blue-500/20 shadow-lg group-hover:scale-110 transition-transform duration-300">
                    <img src="assets/images/logo.png" alt="Black Knights Logo" class="w-6 h-6 object-contain">
                </div>
                <span class="text-2xl font-black tracking-tighter uppercase">Black<span
                        class="text-blue-600">Knights</span></span>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center gap-10">
                <div class="flex items-center gap-8">
                    <a href="club.html"
                        class="text-[13px] font-bold hover:text-blue-600 transition-all uppercase tracking-[0.15em] text-slate-600 dark:text-slate-300">Club</a>
                    <a href="academy.html"
                        class="text-[13px] font-bold text-blue-600 uppercase tracking-[0.15em]">Academy</a>
                    <a href="tournaments.html"
                        class="text-[13px] font-bold hover:text-blue-600 transition-all uppercase tracking-[0.15em] text-slate-600 dark:text-slate-300">Tournaments</a>
                    <a href="shop.html"
                        class="text-[13px] font-bold hover:text-blue-600 transition-all uppercase tracking-[0.15em] text-slate-600 dark:text-slate-300">Shop</a>
                </div>

                <div class="h-8 w-px bg-slate-200 dark:bg-slate-800 mx-2"></div>

                <div class="flex items-center gap-5">
                    <button id="theme-toggle"
                        class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-blue-500/50 transition-all text-slate-600 dark:text-slate-400">
                        <i id="theme-icon" class="fas fa-sun"></i>
                    </button>
                    <a href="login.html"
                        class="text-[13px] font-bold uppercase tracking-wider hover:text-blue-600 px-2 transition-colors">Login</a>
                    <a href="register.html"
                        class="px-7 py-3 text-[13px] font-bold rounded-2xl bg-blue-600 text-white hover:bg-blue-700 hover:shadow-xl hover:shadow-blue-500/30 transition-all uppercase tracking-widest active:scale-95 text-center">
                        Join Us
                    </a>
                </div>
            </div>

            <!-- Mobile Toggle -->
            <button
                class="lg:hidden w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-black mb-8">Chess Academy</h1>
            <p class="text-lg text-slate-500 max-w-2xl mb-12">Systematic learning programs for all skill levels.</p>

            <div class="grid md:grid-cols-2 gap-8">
                <div
                    class="group p-10 rounded-[50px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-blue-600 transition-all">
                    <div class="text-blue-600 text-3xl mb-6"><i class="fas fa-graduation-cap"></i></div>
                    <h3 class="text-2xl font-bold mb-4">Intermediate Mastery</h3>
                    <p class="text-slate-500 mb-8 font-medium">Deep dive into openings, endgames, and advanced tactics.
                    </p>
                    <button
                        class="px-8 py-3 rounded-2xl border-2 border-slate-900 dark:border-white font-bold uppercase text-xs">View
                        Syllabus</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;
        function updateThemeElements(isDark) {
            if (isDark) {
                html.classList.add('dark');
                if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                html.classList.remove('dark');
                if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        updateThemeElements(currentTheme === 'dark');
        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                const isDark = html.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateThemeElements(isDark);
            });
        }
    </script>
</body>

</html>
