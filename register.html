<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Black Knights Chess Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#050505',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-500 font-sans min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <div
                    class="bg-blue-600 p-2.5 rounded-2xl shadow-blue-500/20 shadow-lg group-hover:scale-110 transition-transform duration-300">
                    <img src="assets/images/logo.png" alt="Black Knights Logo" class="w-6 h-6 object-contain">
                </div>
                <span class="text-2xl font-black tracking-tighter uppercase">Black<span
                        class="text-blue-600">Knights</span></span>
            </a>
            <button id="theme-toggle"
                class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-blue-500/50 transition-all text-slate-600 dark:text-slate-400">
                <i id="theme-icon" class="fas fa-sun"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
        <div class="w-full max-w-lg">
            <div
                class="bg-white dark:bg-slate-900 p-10 rounded-[40px] shadow-2xl border border-slate-200 dark:border-slate-800">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-black mb-2 uppercase tracking-tight">Begin Your Journey</h1>
                    <p class="text-slate-500 text-sm font-medium">Choose your path to chess mastery</p>
                </div>

                <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-2 space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">First
                                    Name</label>
                                <input type="text"
                                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all font-medium"
                                    placeholder="Magnus">
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Last
                                    Name</label>
                                <input type="text"
                                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all font-medium"
                                    placeholder="Carlsen">
                            </div>
                        </div>
                        <div>
                            <label
                                class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email</label>
                            <input type="email"
                                class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all font-medium"
                                placeholder="magnus@chess.com">
                        </div>

                        <div>
                            <label
                                class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Interested
                                In</label>
                            <div class="grid grid-cols-2 gap-4">
                                <label class="cursor-pointer">
                                    <input type="checkbox" class="hidden peer" name="interest" value="club">
                                    <div
                                        class="p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent peer-checked:border-blue-600 peer-checked:bg-blue-600/5 text-center transition-all">
                                        <span class="text-xs font-bold uppercase tracking-widest">Club</span>
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="checkbox" class="hidden peer" name="interest" value="academy">
                                    <div
                                        class="p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent peer-checked:border-blue-600 peer-checked:bg-blue-600/5 text-center transition-all">
                                        <span class="text-xs font-bold uppercase tracking-widest">Academy</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Password</label>
                                <input type="password"
                                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all font-medium"
                                    placeholder="••••••••">
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Confirm</label>
                                <input type="password"
                                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all font-medium"
                                    placeholder="••••••••">
                            </div>
                        </div>

                        <button
                            class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-[0.2em] hover:bg-blue-700 hover:shadow-xl hover:shadow-blue-500/30 transition-all active:scale-95 text-xs">
                            Create Account
                        </button>
                    </div>
                </form>

                <div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800 text-center">
                    <p class="text-sm text-slate-500 font-medium">Already a member? <a href="login.html"
                            class="text-blue-600 font-bold hover:underline">Log In</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;
        function updateThemeElements(isDark) {
            if (isDark) {
                html.classList.add('dark');
                if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                html.classList.remove('dark');
                if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        updateThemeElements(currentTheme === 'dark');
        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                const isDark = html.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateThemeElements(isDark);
            });
        }
    </script>
</body>

</html>
